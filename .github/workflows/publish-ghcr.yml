name: publish-ghcr

# Publishes the FiderH image to GHCR under ghcr.io/hodyhq/fiderh.
# Fires on push to main/beta (rolling :main and :beta tags) and on release
# publish (versioned tag). Independent of the upstream publish.yml Docker Hub
# workflow so both can coexist during the migration.

on:
  push:
    branches:
      - main
      - beta
  release:
    types: [published]

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -eu
          IMAGE=ghcr.io/hodyhq/fiderh
          TAGS="${IMAGE}:sha-${GITHUB_SHA::7}"
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME}"
            TAGS="${TAGS},${IMAGE}:${VERSION},${IMAGE}:stable"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:main"
          elif [ "${GITHUB_REF_NAME}" = "beta" ]; then
            TAGS="${TAGS},${IMAGE}:beta"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64/v8
          build-args: |
            COMMITHASH=${{ github.sha }}
            VERSION=${{ steps.tags.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
