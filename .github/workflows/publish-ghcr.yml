name: publish-ghcr

# Builds the FiderH image to ghcr.io/hodyhq/fiderh. Prod (ideas.hcm.adev)
# pulls :stable from here — but only when fider-deploy is run manually, so
# merging to main never touches prod by itself.
#
# Triggers: push to main (rolling :stable + :sha-*), release publish
# (adds the version tag), and manual dispatch.

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so git-describe can derive the version from tags.
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version and tags
        id: meta
        run: |
          set -eu
          IMAGE=ghcr.io/hodyhq/fiderh
          VERSION="$(git describe --tags --always)"
          TAGS="${IMAGE}:sha-${GITHUB_SHA::7},${IMAGE}:stable"
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME}"
            TAGS="${TAGS},${IMAGE}:${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64/v8
          build-args: |
            COMMITHASH=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
