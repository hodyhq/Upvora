# Builds and publishes the Upvora Docker image when a release tag lands on the
# GitHub mirror (tags arrive via the GitLab push mirror; primary CI is GitLab).
# Self-hosters pull ghcr.io/hodyhq/upvora — no local build required.
name: release-image

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMITHASH=${{ github.sha }}
          tags: |
            ghcr.io/hodyhq/upvora:${{ github.ref_name }}
            ghcr.io/hodyhq/upvora:latest
