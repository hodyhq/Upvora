# .gitlab-ci.yml — Upvora
# Port of .github/workflows/build.yml to GitLab CI.
#
# Merge gate: full test+build on merge requests TARGETING main + main pushes
#   (workflow: never commit main directly — develop on beta, MR beta->main).
# Publish: on `beta` pushes, build+push the image to registry.hody.sh so the
#   upvora-beta box can `docker compose pull` (down/pull/up upgrades).
# Runner: VM112 homelab-docker, privileged DinD (non-TLS, port 2375).

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "beta"'

stages:
  - lint-test
  - build
  - publish
  - e2e

variables:
  DATABASE_URL: "postgres://fider_ci:fider_ci_pw@postgres:5432/fider_ci?sslmode=disable"
  POSTGRES_USER: fider_ci
  POSTGRES_PASSWORD: fider_ci_pw
  POSTGRES_DB: fider_ci

# gate = the promotion path (MR->main) + main
.gate-rules: &gate-rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main"'

.dind: &dind
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    # non-TLS DinD: avoids needing the runner to mount /certs/client. Plaintext
    # docker socket on the isolated per-job network — fine for internal CI.
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""

# ---------------------------------------------------------------------------
# lint-test stage (merge gate)
# ---------------------------------------------------------------------------

test-ui:
  stage: lint-test
  <<: *gate-rules
  image: node:22-bookworm
  cache:
    key:
      files: [package-lock.json]
    paths: [.npm/]
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - make lint-ui
    - make test-ui

test-server:
  stage: lint-test
  <<: *gate-rules
  image: golang:1.25-bookworm
  services:
    - name: postgres:17
      alias: postgres
    - name: getfider/minio:0.0.2
      alias: minio
  variables:
    MINIO_ACCESS_KEY: s3user
    MINIO_SECRET_KEY: s3user-s3cr3t
    BLOB_STORAGE_S3_ENDPOINT_URL: "http://minio:9000"
    FF_NETWORK_PER_BUILD: "true"
    GOCACHE: "$CI_PROJECT_DIR/.gocache"
  cache:
    - key: { files: [go.sum] }
      paths: [.gocache/]
    - key: { files: [package-lock.json] }
      paths: [.npm/]
  before_script:
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    - npm ci --cache .npm --prefer-offline
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.7.2
    - go install github.com/joho/godotenv/cmd/godotenv@latest
  script:
    - make lint-server
    - mkdir -p ./dist
    - make test-server SHORT=false

# ---------------------------------------------------------------------------
# build stage — validates the production image builds (merge gate, no push)
# ---------------------------------------------------------------------------

build:
  stage: build
  <<: [*dind, *gate-rules]
  script:
    - docker build --build-arg VERSION=ci-$CI_COMMIT_SHORT_SHA --build-arg COMMITHASH=$CI_COMMIT_SHORT_SHA -t upvora:ci-$CI_COMMIT_SHORT_SHA .

# ---------------------------------------------------------------------------
# publish stage — build+push to registry.hody.sh on beta (box pulls :beta)
# ---------------------------------------------------------------------------

publish:
  stage: publish
  <<: *dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "beta"'
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build --build-arg VERSION=$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA --build-arg COMMITHASH=$CI_COMMIT_SHORT_SHA
      -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

# ---------------------------------------------------------------------------
# e2e stage  ⚠️ manual until tuned (full-parity target)
# ---------------------------------------------------------------------------

.e2e-base:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.55.0-noble
  when: manual
  allow_failure: true
  variables:
    FF_NETWORK_PER_BUILD: "true"
  services:
    - name: postgres:17
      alias: postgres
    - name: mailhog/mailhog:latest
      alias: mailhog
  before_script:
    - npm ci --cache .npm --prefer-offline
    # ⚠️ OPEN ITEM: run a Fider instance the tests can hit (HTTP-mode first; see notes).

test-e2e-ui:
  extends: .e2e-base
  script:
    - make test-e2e-ui

test-e2e-server:
  extends: .e2e-base
  script:
    - make test-e2e-server

# ===========================================================================
# NOTES
# 1. registry.hody.sh enabled (registry_nginx :5050, TLS at Traefik CT101). CI_REGISTRY*
#    vars are auto-provided. Image: registry.hody.sh/hodyhq/upvora.
# 2. Runner VM112 privileged=true for DinD (non-TLS, port 2375). DNS 10.99.90.1.
# 3. e2e TLS-cert/service-network wiring still to tune before flipping off `manual`.
# 4. golangci-lint v2.7.2 pinned to match GitHub workflow.
# ===========================================================================
